name = "capyvivi"
compatibility_date = "2026-04-12"
pages_build_output_dir = "."

[build]
command = "npm run check"
watch_paths = ["styles/**", "scripts/**", "*.html"]

[env.production.vars]
STRIPE_SECRET_KEY = ""

[vars]
# Set STRIPE_SECRET_KEY in Cloudflare dashboard for production.
# Use `wrangler secret put STRIPE_SECRET_KEY` for local development.

